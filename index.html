<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McDonald's Kiosk</title>
    <style>
        :root {
            --mcd-red: #DA291C;
            --mcd-yellow: #FFBC0D;
            --mcd-dark: #292929;
            --mcd-grey: #F5F5F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            height: 100%;
            background-color: var(--mcd-grey);
            overflow: hidden;
        }

        /* SCREEN 1: WELCOME ADS SPLASH (image_5.png) */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1000&auto=format&fit=crop') center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 25px;
            z-index: 200;
        }

        .ad-text {
            color: white;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 4px 12px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            line-height: 1.2;
            max-width: 80%;
        }

        .welcome-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .start-order-btn {
            background-color: white;
            color: var(--mcd-dark);
            border: none;
            padding: 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .login-rewards-btn {
            background-color: var(--mcd-yellow);
            color: var(--mcd-dark);
            border: none;
            padding: 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* SCREEN 2: DINE LOCATION SELECTOR (image_6.png) */
        #location-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            z-index: 150;
            text-align: center;
        }

        .location-header-logo {
            width: 70px;
            margin-bottom: 30px;
        }

        .location-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--mcd-dark);
            margin-bottom: 40px;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .location-card {
            background: white;
            border: 2px solid #EAEAEA;
            border-radius: 16px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .location-card:active {
            border-color: var(--mcd-yellow);
            background-color: #FFFDF7;
        }

        .location-icon {
            font-size: 60px;
        }

        .location-label {
            font-size: 18px;
            font-weight: 700;
            color: var(--mcd-dark);
        }

        /* SCREEN 3: MAIN MENU (Our Multilingual Kiosk) */
        .kiosk-container {
            display: none;
            grid-template-columns: 110px 1fr;
            grid-template-rows: 70px 1fr 90px;
            height: 100vh;
        }

        /* Header Layout */
        .kiosk-header {
            grid-column: span 2;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #EAEAEA;
        }

        .mcd-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 70px;
        }

        .mcd-logo {
            width: 100%;
            height: auto;
            fill: var(--mcd-yellow);
        }

        /* Language Selector Dropdown */
        .lang-select-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-dropdown {
            background: var(--mcd-grey);
            color: var(--mcd-dark);
            border: 1px solid #DDD;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Sidebar Menu Navigation */
        .sidebar {
            background-color: white;
            border-right: 1px solid #EAEAEA;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 5px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            text-align: center;
            color: #555;
        }

        .nav-item.active {
            background-color: #FFF8E7;
            border-left: 5px solid var(--mcd-yellow);
            color: var(--mcd-dark);
            font-weight: bold;
        }

        .nav-icon {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .nav-label {
            font-size: 11px;
            line-height: 1.2;
            font-weight: 600;
        }

        /* Menu Display Grid */
        .menu-content {
            padding: 15px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            grid-gap: 12px;
            align-content: start;
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #EAEAEA;
            cursor: pointer;
        }

        .menu-item:active {
            transform: scale(0.97);
        }

        .item-img {
            font-size: 48px;
            margin-bottom: 8px;
            height: 60px;
            display: flex;
            align-items: center;
        }

        .item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--mcd-dark);
            margin-bottom: 4px;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .item-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--mcd-red);
        }

        /* Checkout Footer Layout */
        .kiosk-footer {
            grid-column: span 2;
            background-color: white;
            border-top: 2px solid #EAEAEA;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
        }

        .cart-info {
            display: flex;
            flex-direction: column;
        }

        .cart-count {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .cart-total {
            font-size: 24px;
            font-weight: 800;
            color: var(--mcd-dark);
        }

        .pay-btn {
            background-color: var(--mcd-yellow);
            color: var(--mcd-dark);
            border: none;
            padding: 15px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 188, 13, 0.4);
        }

        .pay-btn:active {
            background-color: #E2A600;
        }

        /* Popup Receipt Window Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .receipt-popup {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
            animation: popUp 0.3s ease-out forwards;
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-logo-box {
            width: 60px;
            margin: 0 auto 10px auto;
        }

        .receipt-number {
            font-size: 36px;
            font-weight: 900;
            color: var(--mcd-red);
            margin: 15px 0;
        }

        .close-btn {
            background: var(--mcd-dark);
            color: white;
            border: none;
            padding: 14px 24px;
            width: 100%;
            border-radius: 20px;
            font-weight: bold;
            font-size: 15px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: AD SPLASH (image_5.png) -->
    <div id="welcome-screen">
        <div class="ad-text" id="welcome-ad-text">Stop drooling and order a juicy burger</div>
        <div class="welcome-buttons">
            <button class="start-order-btn" id="start-order-txt" onclick="goToLocationScreen()">Start Order</button>
            <button class="login-rewards-btn">Log In</button>
        </div>
    </div>

    <!-- SCREEN 2: EAT IN / TAKE AWAY SELECTOR (image_6.png) -->
    <div id="location-screen">
        <svg class="location-header-logo" viewBox="0 0 101 88" fill="var(--mcd-yellow)" xmlns="http://www.w3.org/2000/svg">
            <path d="M50.41 87.14C45.28 59.84 37.1 27.69 28.71 0C19.78 29.35 10.36 60.67 5.02 87.14H0C6.55 54.07 17.5 19.38 28.66 0.1C32.07 24.32 41.34 59.39 50.41 87.14ZM50.41 87.14C59.48 59.39 68.75 24.32 72.16 0.1C83.32 19.38 94.27 54.07 100.82 87.14H95.8C90.46 60.67 81.04 29.35 72.11 0C63.72 27.69 55.54 59.84 50.41 87.14Z"/>
        </svg>
        <div class="location-title" id="location-question">Where will you be eating today?</div>
        
        <div class="options-container">
            <div class="location-card" onclick="goToMenuScreen()">
                <div class="location-icon">🍔</div>
                <div class="location-label" id="lbl-eatin">Eat In</div>
            </div>
            <div class="location-card" onclick="goToMenuScreen()">
                <div class="location-icon">🛍️</div>
                <div class="location-label" id="lbl-takeaway">Take Away</div>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: MENU DASHBOARD -->
    <div class="kiosk-container" id="main-kiosk-menu">
        <header class="kiosk-header">
            <div class="mcd-logo-container">
                <svg class="mcd-logo" viewBox="0 0 101 88" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50.41 87.14C45.28 59.84 37.1 27.69 28.71 0C19.78 29.35 10.36 60.67 5.02 87.14H0C6.55 54.07 17.5 19.38 28.66 0.1C32.07 24.32 41.34 59.39 50.41 87.14ZM50.41 87.14C59.48 59.39 68.75 24.32 72.16 0.1C83.32 19.38 94.27 54.07 100.82 87.14H95.8C90.46 60.67 81.04 29.35 72.11 0C63.72 27.69 55.54 59.84 50.41 87.14Z"/>
                </svg>
            </div>
            
            <div class="lang-select-container">
                <span style="font-size: 18px;">🌐</span>
                <select class="lang-dropdown" id="lang-selector" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="mk">Македонски</option>
                    <option value="de">Deutsch</option>
                    <option value="es">Español</option>
                </select>
            </div>
        </header>

        <nav class="sidebar" id="sidebar-nav"></nav>
        <main class="menu-content" id="menu-grid"></main>

        <footer class="kiosk-footer">
            <div class="cart-info">
                <span class="cart-count" id="cart-qty">0 items selected</span>
                <span class="cart-total" id="cart-total">$0.00</span>
            </div>
            <button class="pay-btn" id="pay-button" onclick="checkoutOrder()">Pay Here</button>
        </footer>
    </div>

    <!-- PAYMENT OVERLAY RECEIPT -->
    <div class="overlay" id="payment-overlay">
        <div class="receipt-popup">
            <div class="popup-logo-box">
                <svg class="mcd-logo" viewBox="0 0 101 88" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50.41 87.14C45.28 59.84 37.1 27.69 28.71 0C19.78 29.35 10.36 60.67 5.02 87.14H0C6.55 54.07 17.5 19.38 28.66 0.1C32.07 24.32 41.34 59.39 50.41 87.14ZM50.41 87.14C59.48 59.39 68.75 24.32 72.16 0.1C83.32 19.38 94.27 54.07 100.82 87.14H95.8C90.46 60.67 81.04 29.35 72.11 0C63.72 27.69 55.54 59.84 50.41 87.14Z"/>
                </svg>
            </div>
            <h3 id="pop-thanks" style="margin-bottom: 5px; color: #292929;">Thank You!</h3>
            <p id="pop-msg" style="font-size: 14px; color: #666;">Please take your receipt and wait for your order.</p>
            <div class="receipt-number" id="order-number">#00</div>
            <button class="close-btn" id="pop-done" onclick="resetKiosk()">Done</button>
        </div>
    </div>

<script>
    // System Screen Flows
    function goToLocationScreen() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('location-screen').style.display = 'flex';
    }

    function goToMenuScreen() {
        document.getElementById('location-screen').style.display = 'none';
        document.getElementById('main-kiosk-menu').style.display = 'grid';
    }

    // UI Localizations Dataset including the new screens
    const uiTranslations = {
        en: {
            ad: "Stop drooling and order a juicy burger", start: "Start Order",
            question: "Where will you be eating today?", eatin: "Eat In", takeaway: "Take Away",
            item: "item", items: "items", selected: "selected", pay: "Pay Here",
            thanks: "Thank You!", msg: "Please take your receipt and wait for your order.", done: "Done"
        },
        mk: {
            ad: "Престани да гледаш и нарачај сочен бургер", start: "Започни Нарачка",
            question: "Каде ќе јадете денес?", eatin: "За тука", takeaway: "За носење",
            item: "артикл", items: "артикли", selected: "избрано", pay: "Плати Тука",
            thanks: "Ви Благодариме!", msg: "Ве молиме земете ја сметката и почекајте ја нарачката.", done: "Готово"
        },
        de: {
            ad: "Hör auf zu sabbern und bestell einen saftigen Burger", start: "Bestellung Starten",
            question: "Wo möchtest du heute essen?", eatin: "Hier essen", takeaway: "Zum Mitnehmen",
            item: "Artikel", items: "Artikel", selected: "ausgewählt", pay: "Hier Bezahlen",
            thanks: "Vielen Dank!", msg: "Bitte nehmen Sie Ihren Kassenbon und warten Sie auf Ihre Bestellung.", done: "Fertig"
        },
        es: {
            ad: "Deja de babear y pide una hamburguesa jugosa", start: "Comenzar Pedido",
            question: "¿Dónde vas a comer hoy?", eatin: "Comer Aquí", takeaway: "Para Llevar",
            item: "artículo", items: "artículos", selected: "seleccionado", pay: "Pagar Aquí",
            thanks: "¡Muchas Gracias!", msg: "Por favor tome su recibo y espere su pedido.", done: "Hecho"
        }
    };

    const menuData = {
        happyMeal: {
            icon: "🎁",
            title: { en: "Happy Meal", mk: "Хепи Мил", de: "Happy Meal", es: "Happy Meal" },
            items: [
                { price: 3.99, img: "🍔", name: { en: "Hamburger Happy Meal", mk: "Хамбургер Хепи Мил", de: "Hamburger Happy Meal", es: "Happy Meal de Hamburguesa" } },
                { price: 4.29, img: "🍗", name: { en: "4pc McNuggets Happy Meal", mk: "4 парчиња Нагетс Хепи Мил", de: "4er McNuggets Happy Meal", es: "Happy Meal 4pc McNuggets" } },
                { price: 4.89, img: "📦", name: { en: "6pc McNuggets Happy Meal", mk: "6 парчиња Нагетс Хепи Мил", de: "6er McNuggets Happy Meal", es: "Happy Meal 6pc McNuggets" } }
            ]
        },
        burgers: {
            icon: "🍔",
            title: { en: "Big Box / Burgers", mk: "Бургери", de: "Burger", es: "Hamburguesas" },
            items: [
                { price: 5.49, img: "🍔", name: { en: "Big Mac", mk: "Биг Мек", de: "Big Mac", es: "Big Mac" } },
                { price: 5.79, img: "🧀", name: { en: "Quarter Pounder", mk: "Квотер Паундер", de: "Hamburger Royal Käse", es: "Cuarto de Libra" } },
                { price: 3.29, img: "🍔", name: { en: "Double Cheeseburger", mk: "Дупли Чизбургер", de: "Doppel-Cheeseburger", es: "Hamburguesa con Queso Doble" } },
                { price: 2.49, img: "🥪", name: { en: "McChicken", mk: "МекЧикен", de: "McChicken", es: "McPollo" } }
            ]
        },
        snacks: {
            icon: "🍟",
            title: { en: "Snacks & Sides", mk: "Снекови / Додатоци", de: "Snacks & Pommes", es: "Complementos" },
            items: [
                { price: 3.19, img: "🍟", name: { en: "French Fries (M)", mk: "Помфрит (М)", de: "Pommes (M)", es: "Papas Fritas (M)" } },
                { price: 3.69, img: "🍟", name: { en: "French Fries (L)", mk: "Помфрит (Л)", de: "Pommes (L)", es: "Papas Fritas (G)" } },
                { price: 4.99, img: "🍗", name: { en: "10pc McNuggets", mk: "10 парчиња Нагетс", de: "10er Chicken McNuggets", es: "10pc McNuggets" } },
                { price: 1.89, img: "🥧", name: { en: "Apple Pie", mk: "Пита со Јаболко", de: "Apfeltasche", es: "Pastel de Manzana" } }
            ]
        },
        drinks: {
            icon: "🥤",
            title: { en: "Beverages", mk: "Пијалоци", de: "Getränke", es: "Bebidas" },
            items: [
                { price: 1.49, img: "🥤", name: { en: "Coca-Cola", mk: "Кока-Кола", de: "Coca-Cola", es: "Coca-Cola" } },
                { price: 1.49, img: "🥤", name: { en: "Sprite", mk: "Спрајт", de: "Sprite", es: "Sprite" } },
                { price: 3.49, img: "🥤", name: { en: "Chocolate Shake", mk: "Чоколаден Шејк", de: "Schoko-Shakemix", es: "Batido de Chocolate" } }
            ]
        }
    };

    let activeLang = 'en';
    let currentCategory = 'happyMeal';
    let cart = [];

    function initKiosk() {
        renderSidebar();
        switchCategory(currentCategory);
        updateCartUI();
    }

    function changeLanguage(langCode) {
        activeLang = langCode;
        renderSidebar();
        switchCategory(currentCategory);
        updateCartUI();
        
        // Update all screens text to match language change
        document.getElementById('welcome-ad-text').textContent = uiTranslations[activeLang].ad;
        document.getElementById('start-order-txt').textContent = uiTranslations[activeLang].start;
        document.getElementById('location-question').textContent = uiTranslations[activeLang].question;
        document.getElementById('lbl-eatin').textContent = uiTranslations[activeLang].eatin;
        document.getElementById('lbl-takeaway').textContent = uiTranslations[activeLang].takeaway;
        
        document.getElementById('pop-thanks').textContent = uiTranslations[activeLang].thanks;
        document.getElementById('pop-msg').textContent = uiTranslations[activeLang].msg;
        document.getElementById('pop-done').textContent = uiTranslations[activeLang].done;
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar-nav');
        sidebar.innerHTML = '';
        
        Object.keys(menuData).forEach(key => {
            const cat = menuData[key];
            const div = document.createElement('div');
            div.className = `nav-item ${key === currentCategory ? 'active' : ''}`;
            div.onclick = () => switchCategory(key);
            div.innerHTML = `
                <div class="nav-icon">${cat.icon}</div>
                <div class="nav-label">${cat.title[activeLang]}</div>
            `;
            sidebar.appendChild(div);
        });
    }

    function switchCategory(categoryKey) {
        currentCategory = categoryKey;
        
        document.querySelectorAll('.nav-item').forEach((elem, index) => {
            const keys = Object.keys(menuData);
            elem.className = `nav-item ${keys[index] === currentCategory ? 'active' : ''}`;
        });

        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';

        menuData[categoryKey].items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'menu-item';
            card.onclick = () => addToCart(item);
            card.innerHTML = `
                <div class="item-img">${item.img}</div>
                <div class="item-name">${item.name[activeLang]}</div>
                <div class="item-price">$${item.price.toFixed(2)}</div>
            `;
            grid.appendChild(card);
        });
    }

    function addToCart(item) {
        cart.push(item);
        updateCartUI();
    }

    function updateCartUI() {
        const qtyElement = document.getElementById('cart-qty');
        const totalElement = document.getElementById('cart-total');
        const payButton = document.getElementById('pay-button');

        const totalCost = cart.reduce((sum, item) => sum + item.price, 0);
        const itemLabel = cart.length === 1 ? uiTranslations[activeLang].item : uiTranslations[activeLang].items;
        
        qtyElement.textContent = `${cart.length} ${itemLabel} ${uiTranslations[activeLang].selected}`;
        totalElement.textContent = `$${totalCost.toFixed(2)}`;
        payButton.textContent = uiTranslations[activeLang].pay;

        if(cart.length === 0) {
            payButton.style.opacity = '0.5';
            payButton.style.pointerEvents = 'none';
        } else {
            payButton.style.opacity = '1';
            payButton.style.pointerEvents = 'auto';
        }
    }

    function checkoutOrder() {
        if (cart.length === 0) return;
        const generatedId = Math.floor(Math.random() * 90) + 10;
        document.getElementById('order-number').textContent = `#${generatedId}`;
        document.getElementById('payment-overlay').style.display = 'flex';
    }

    function resetKiosk() {
        cart = [];
        updateCartUI();
        document.getElementById('payment-overlay').style.display = 'none';
        document.getElementById('main-kiosk-menu').style.display = 'none';
        document.getElementById('welcome-screen').style.display = 'flex';
        switchCategory('happyMeal');
    }

    window.onload = initKiosk;
</script>
